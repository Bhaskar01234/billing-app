<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing App</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f7fb;
            margin:0;
            padding:20px;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        h1{
            text-align:center;
            color:#222;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.08);
            margin-bottom:20px;
        }

        input,select{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#16a34a;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#15803d;
        }

        .bill{
            background:#ecfdf5;
            padding:20px;
            border-radius:12px;
        }

        a{
            display:inline-block;
            margin-top:15px;
            text-decoration:none;
            color:#2563eb;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Billing App</h1>

    <div class="card">

        <form method="POST">

            <input
                type="text"
                name="customer"
                placeholder="Customer Name"
                required
            >

            <select name="product" required>

                <option value="">
                    Select Product
                </option>

                {% for product in products %}
                <option value="{{ product.id }}">
                    {{ product.name }} - ₹{{ product.price }}
                    (Stock: {{ product.quantity }})
                </option>
                {% endfor %}

            </select>

            <input
                type="number"
                name="quantity"
                placeholder="Quantity"
                required
            >

            <button type="submit">
                Generate Bill
            </button>

        </form>

        <a href="/products">Manage Inventory</a>

    </div>

    {% if grand_total %}

    <div class="bill">

        <h2>Bill Receipt</h2>

        <p><strong>Customer:</strong> {{ customer }}</p>

        <p><strong>Product:</strong> {{ product }}</p>

        <p><strong>Price:</strong> ₹{{ price }}</p>

        <p><strong>Quantity:</strong> {{ quantity }}</p>

        <h3>Total: ₹{{ grand_total }}</h3>

    </div>

    {% endif %}

</div>

</body>
</html>
