<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f7fb;
            margin:0;
            padding:20px;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        h1{
            text-align:center;
            color:#222;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.08);
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:left;
        }

        th{
            background:#2563eb;
            color:white;
        }

        .low{
            color:red;
            font-weight:bold;
        }

        a{
            display:inline-block;
            margin-top:15px;
            text-decoration:none;
            color:#2563eb;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Inventory Management</h1>

    <div class="card">

        <form method="POST">

            <input
                type="text"
                name="name"
                placeholder="Product Name"
                required
            >

            <input
                type="number"
                name="price"
                placeholder="Price"
                required
            >

            <input
                type="number"
                name="quantity"
                placeholder="Stock Quantity"
                required
            >

            <button type="submit">
                Add Product
            </button>

        </form>

    </div>

    <div class="card">

        <table>

            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Status</th>
            </tr>

            {% for product in products %}
            <tr>

                <td>{{ product.name }}</td>

                <td>₹{{ product.price }}</td>

                <td>{{ product.quantity }}</td>

                <td>
                    {% if product.quantity == 0 %}
                        <span class="low">Out of Stock</span>

                    {% elif product.quantity <= 5 %}
                        <span class="low">Low Stock ⚠️</span>

                    {% else %}
                        Available
                    {% endif %}
                </td>

            </tr>
            {% endfor %}

        </table>

        <a href="/">← Billing Page</a>

    </div>

</div>

</body>
</html>
